name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm test
      - run: npm run build

  deploy:
    # Code-only deploy to the chaosofzen Pages repo. Runs on green main pushes.
    #
    # Images, day/, and the generated data/*.json are gitignored here, so a CI
    # checkout does not have them. This job therefore publishes ONLY the build
    # output and files tracked in git, and never deletes anything else in the
    # deploy repo. Content changes go out via scripts/deploy.sh from a machine
    # that has run `npm run pipeline`.
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-chaosofzen
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm run build

      - name: Check out deploy repo
        uses: actions/checkout@v4
        with:
          repository: gitizenme/chaosofzen
          ssh-key: ${{ secrets.CHAOSOFZEN_DEPLOY_KEY }}
          path: deploy

      - name: Sync build output
        run: |
          set -euo pipefail

          # assets/ is fully regenerated by vite, so mirroring it is safe.
          rsync -a --delete dist/assets/ deploy/assets/
          cp dist/index.html deploy/index.html

          # Publish only data files tracked in git; the pipeline-generated ones
          # (artworks, atlas, attractors, days, analysis) stay as-is on the site.
          git ls-files public | while read -r tracked; do
            rel="${tracked#public/}"
            mkdir -p "deploy/$(dirname "$rel")"
            cp "dist/$rel" "deploy/$rel"
          done

      - name: Commit and push
        working-directory: deploy
        # Commit message goes through env, never ${{ }} interpolation into the
        # shell — otherwise a crafted commit message is arbitrary code execution
        # on a runner holding the deploy key.
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to deploy."
            exit 0
          fi
          git add -A
          git commit -m "Deploy: $(printf '%s' "$HEAD_MSG" | head -n 1)" \
                     -m "Source: gitizenme/365-strange-attractors@${SOURCE_SHA}"
          git push origin main
